[element_panel.ribbon]
group.name = "Grupo"
group.desc = "Una carpeta para agrupar objetos. Esta es una función exclusiva de Yerevan: el archivo se guardará como un 'FeatureCollection' de GeoJSON válido (plano). Yerevan podrá reconstruir la carpeta de nuevo al reabrir el archivo."

point.name = "Punto"

line.name = "Línea"

polygon.name = "Polígono"

rectangle.name = "Rectángulo"

circle.name = "Círculo"

collection.name = "Colección de geometrías"
collection.desc = "Una colección de objetos GeoJSON. Yerevan escogerá el tipo de 'GeometryCollection' correcto al guardar el archivo. De acuerdo al estándar GeoJSON, los objetos pertenecientes a un 'GeometryCollection' no son independientes y no almacenan propiedades individuales."

[tool_ribbon]
point.title = "Punto"
polygon.title = "Polígono"

[tool.new.point.settings]
name = "Nuevo punto"
desc = "Añade nuevos puntos al documento."

mode.name = "Forma de añadir"
mode.desc = "Elige qué pasa cuando añades un nuevo punto."

mode.single.name = "Seleccionar el punto añadido."
mode.multi.name = "Seguir añadiendo puntos."
mode.named.name = "Preguntar por un nombre y seguir añadiendo puntos."

[tool.point.move_shape]
name = "Mover punto"
desc = "Mueve el punto a otro lugar en el mapa."

[tool.polygon.draw_vertices]
name = "Dibujar vértices"
desc = "Añade nuevos vértices al polígono."

[tool.polygon.draw_vertices.settings]
desc = "Pulsa en algún lugar del mapa para añadir el próximo vértice del polígono. Cuando acabes, pulsa en el primer vértice para cerrarlo, o deja de utilizar la herramienta y se cerrará de forma automática. Puedes pulsar 'z' para dibujar líneas rectas."
section.options = "Opciones"
snap.name = "Pegarse a objetos cercanos"
snap.desc = "Mientras esté activo, el cursor se pegará automáticamente a objetos cercanos (como vértices o puntos), evitando tener que calcar a dedo una frontera compartida."
show_verts.name = "Mostrar vértices"
show_verts.desc = "Mientras esté activo, mostrará un icono en cada vértice del polígono."
snap_distance.name = "Snap distance"
snap_distance.desc = "The distance, in pixels, under which the cursor will snap to nearby features."
pencil_step.name = "Pencil step"
pencil_step.desc = "The distance, in pixels, between vertices laid out while right-clicking."
vertex_size.name = "Vertex size"
vertex_size.desc = "The size of the vertices on the map (visual only)."

[tool.polygon.move_vertices]
name = "Move vertices"
desc = "Move the vertices that make up this polygon, and add new vertices between them."

[tool.polygon.cut]
name = "Cut shape"
desc = "Draw a new shape that will be cut from this one."

[tool.polygon.delete_vertices]
name = "Delete vertices"
desc = "Remove individual vertices, or entire sections of the shape."

[tool.polygon.delete_vertices.settings]
desc = "Select one of the two delete modes to choose how to delete vertices."
section.mode = "Mode"
section.delete_section = "Delete section"
mode.individual.name = "Individual"
mode.individual.desc = "Click on individual vertices to remove them."
mode.section.name = "Section"
mode.section.desc = "Select two vertices. This will form a path between the two. Then, use the 'Delete vertices' button to delete all vertices in the path, excluding both ends."
delete_section.reverse = "Reverse path"
delete_section.delete = "Delete vertices"

[tool.polygon.union]
name = "Polygon union"
desc = "Choose other polygons to add their area to this one."

[tool.polygon.union.settings]
desc = "Select a polygon from the list below and click on 'Join'. Alternatively, just hold down Ctrl and click on other polygons on the map to add them to this one."
section.options = "Options"
menu_placeholder = "Select a feature..."
join = "Join"
delete_target.label = "Delete polygons added to this one."

[tool.polygon.difference]
name = "Polygon difference"
desc = "Choose other polygons to remove their area from this one."

[tool.polygon.difference.settings]
name = "Difference tool"
desc = "Select a polygon from the list below and click on 'Carve'. Alternatively, just hold down Ctrl and click on other polygons on the map to remove them from this one."
section.options = "Options"
menu_placeholder = "Select a feature..."
carve = "Carve"
delete_target.label = "Delete polygons used to carve this one."

[tool.polygon.intersection]
name = "Polygon intersection"
desc = "Choose another polygon to remove all area in this polygon that isn't shared with the one chosen."

[tool.polygon.intersection.settings]
name = "Intersection tool"
desc = "Select a polygon from the list below and click on 'Clip'. Alternatively, just hold down Ctrl and click on other polygons on the map to preserve the intersection between the two."
section.options = "Options"
menu_placeholder = "Select a feature..."
carve = "Clip"
delete_target.label = "Delete polygons used to intersect with this one."

[tool.polygon.set_origin]
name = "Set first vertex"
desc = "Choose which vertex becomes the first vertex of the shape."
settings.name = "Set first vertex tool"
settings.desc = "Click on a vertex to make it the first vertex of the polygon. This will make it easier to further edit the polygon from whichever part is more convenient."

[tool.polygon.move_shape]
name = "Move polygon"
desc = "Move the polygon itself around the map."

