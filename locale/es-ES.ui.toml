new.desc = "Crea un nuevo documento en blanco."

open.name = "Abrir documento"
open.desc = "Abre otro documento de Yerevan. Para usar un documento GeoJSON de otro origen, usa la función de 'Importar'."

save.name = "Guardar documento"
save.desc = "Guarda este documento como un archivo GeoJSON, almacenando los metadatos de Yerevan para que pueda volverse a usar dentro de esta aplicación. Usa esta opción si deseas volver a editar este archivo en esta aplicacion en un futuro."

import.name = "Importar GeoJSON"
import.desc = "Añade parcial o totalmente el contenido de otro documento GeoJSON a éste."

export.name = "Exportar GeoJSON"
export.desc = "Guarda este documento como un archivo GeoJSON genérico, sin guardar metadatos de Yerevan. Usa esta opción si no tienes intención de volver a abrir esa copia en esta aplicación."

